<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Controle de Finanças</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://raw.githubusercontent.com/CaioFerAmorim/controle-financas/refs/heads/main/static/img/logoWildMoneyIcon.ico" type="image/x-icon">
    <style>
        /* ── Sidebar fixa que acompanha o conteúdo ─────────────── */
        .page-wrapper {
            display: flex;
            min-height: calc(100vh - 98px); /* desconta o header */
        }
        .sidebar-nav {
            width: 200px;
            min-width: 200px;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #adb5bd;
            padding: 4px 12px 10px;
        }
        .sidebar-nav .nav-link {
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 6px;
            color: rgba(255,255,255,.8) !important;
            transition: background .15s, color .15s;
        }
        .sidebar-nav .nav-link:hover {
            background: rgba(255,255,255,.1);
            color: #fff !important;
        }
        .sidebar-nav .nav-link[aria-current="page"] {
            background: rgba(255,255,255,.15);
            color: #fff !important;
            font-weight: 600;
        }
        .sidebar-content {
            flex: 1;
            min-width: 0;
            padding: 1.5rem;
        }

        thead.thead-fin th { background:#1A4D2E; color:#fff; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; padding:10px 12px; border:none; white-space:nowrap; }
        tbody tr td { font-size:13px; vertical-align:middle; }
        .pag-info { font-size:12px; color:#6c757d; }
        .table-wrapper { min-height:280px; }
    </style>
</head>
<body class="bg-light">

<header class="text-white py-3" style="background-color: #1A4D2E;">
    <div class="container d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <img src="https://raw.githubusercontent.com/CaioFerAmorim/controle-financas/e24343c1468b7c5f06a8230f0913f834dab0635b/static/img/logoWildMoney.png"
                 alt="Logo" class="me-3" style="width:80px;height:80px;">
            <div><h1 class="h5 mb-0">Controle de Finanças</h1><small>Gerencie seus gastos</small></div>
        </div>
        <nav>
            <a href="{{ url_for('index') }}"       class="text-white text-decoration-none me-3">Início</a>
            <a href="{{ url_for('lancamentos') }}" class="text-white text-decoration-none me-3">Lançamentos</a>
            <a href="{{ url_for('projecoes') }}"   class="text-white text-decoration-none me-3">Projeções</a>
            <a href="{{ url_for('visaoGeral') }}"  class="text-white text-decoration-none">Visão Geral</a>
        </nav>
    </div>
</header>

<div class="page-wrapper">
    <nav class="sidebar-nav bg-dark text-white p-3">
        <div class="sidebar-title">Lançamentos</div>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="{{ url_for('lancamentos') }}"            class="nav-link text-white">Despesas</a></li>
            <li class="nav-item"><a href="{{ url_for('lancamentosAssinaturas') }}" class="nav-link text-white">Assinaturas</a></li>
            <li class="nav-item"><a href="{{ url_for('lancamentosReceita') }}"     class="nav-link text-white">Receitas</a></li>
            <li class="nav-item"><a href="{{ url_for('lancamentosConta') }}"       class="nav-link text-white">Contas</a></li>
            <li class="nav-item"><a href="{{ url_for('lancamentosCartao') }}"      class="nav-link text-white">Cartões</a></li>
            <li class="nav-item"><a href="{{ url_for('lancamentosCategorias') }}"  class="nav-link text-white" aria-current="page">Categorias</a></li>
        </ul>
    </nav>
    <div class="sidebar-content">
<div class="container mt-4">
        <div class="row g-4">

            <!-- Categorias de Despesas -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center">Categorias de Despesas</div>
                    <div class="card-body">
                        <form id="formDesp" class="mb-3">
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <input type="text" class="form-control" id="nomeCatDesp" placeholder="Ex: Alimentação, Transporte..." required>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-success w-100">Adicionar</button>
                                </div>
                            </div>
                        </form>

                        <div id="toolbarCatDesp"></div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="pag-info" id="infoCatDesp">—</span>
                            <div class="d-flex align-items-center gap-2">
                                <label class="pag-info mb-0">Linhas:</label>
                                <select id="ippCatDesp" class="form-select form-select-sm" style="width:70px;">
                                    <option value="10" selected>10</option><option value="25">25</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-wrapper table-responsive">
                            <table class="table table-striped table-hover mb-0">
                                <thead class="thead-fin">
                                    <tr><th>Nome</th><th class="text-center">Ações</th></tr>
                                </thead>
                                <tbody id="tabelaCatDesp"></tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-center mt-3">
                            <nav><ul class="pagination pagination-sm mb-0" id="pagCatDesp"></ul></nav>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Categorias de Receitas -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white text-center">Categorias de Receitas</div>
                    <div class="card-body">
                        <form id="formRec" class="mb-3">
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <input type="text" class="form-control" id="nomeCatRec" placeholder="Ex: Salário, Investimentos..." required>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-success w-100">Adicionar</button>
                                </div>
                            </div>
                        </form>

                        <div id="toolbarCatRec"></div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="pag-info" id="infoCatRec">—</span>
                            <div class="d-flex align-items-center gap-2">
                                <label class="pag-info mb-0">Linhas:</label>
                                <select id="ippCatRec" class="form-select form-select-sm" style="width:70px;">
                                    <option value="10" selected>10</option><option value="25">25</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-wrapper table-responsive">
                            <table class="table table-striped table-hover mb-0">
                                <thead class="thead-fin">
                                    <tr><th>Nome</th><th class="text-center">Ações</th></tr>
                                </thead>
                                <tbody id="tabelaCatRec"></tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-center mt-3">
                            <nav><ul class="pagination pagination-sm mb-0" id="pagCatRec"></ul></nav>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    function criarPaginador(tbody, selectLinhas, ulPag, infoSpan) {
        let linhas=[], pagAtual=1;
        const ipp=()=>parseInt(selectLinhas.value), tp=()=>Math.max(1,Math.ceil(linhas.length/ipp()));
        function render() {
            const total=linhas.length,pg=tp(); pagAtual=Math.min(pagAtual,pg);
            const ini=(pagAtual-1)*ipp(), fim=Math.min(ini+ipp(),total);
            linhas.forEach((tr,i)=>tr.style.display=(i>=ini&&i<fim)?'':'none');
            if(infoSpan) infoSpan.textContent=total===0?'Nenhum registro':`Mostrando ${ini+1}–${fim} de ${total} registro${total!==1?'s':''}`;
            ulPag.innerHTML='';
            let b=Math.max(1,pagAtual-2),e=Math.min(pg,b+4); if(e-b<4) b=Math.max(1,e-4);
            const add=(lbl,p,dis,act)=>{ const li=document.createElement('li'); li.className=`page-item${dis?' disabled':''}${act?' active':''}`; li.innerHTML=`<button class="page-link">${lbl}</button>`; if(!dis&&!act) li.querySelector('button').onclick=()=>{pagAtual=p;render();}; ulPag.appendChild(li); };
            add('«',1,pagAtual===1); add('‹',pagAtual-1,pagAtual===1);
            for(let p=b;p<=e;p++) add(p,p,false,p===pagAtual);
            add('›',pagAtual+1,pagAtual===pg); add('»',pg,pagAtual===pg);
        }
        selectLinhas.addEventListener('change',()=>{pagAtual=1;render();});
        return { adicionar(tr){linhas.push(tr);tbody.appendChild(tr);render();}, remover(tr){linhas=linhas.filter(l=>l!==tr);tr.remove();render();} };
    }

    const pagDesp = new TabelaManager({
        tbody: document.getElementById("tabelaCatDesp"), thead: document.getElementById("theadCatDesp"),
        toolbar: document.getElementById("toolbarCatDesp"), selLinhas: document.getElementById("ippCatDesp"),
        ulPag: document.getElementById("pagCatDesp"), infoSpan: document.getElementById("infoCatDesp"),
        colunas: [
            { chave: "nome",  tipo: "texto", label: "Nome",  opcoes: false },
            { chave: "acoes", tipo: "acoes", label: "Ações", opcoes: false },
        ]
    });
    const pagRec = new TabelaManager({
        tbody: document.getElementById("tabelaCatRec"), thead: document.getElementById("theadCatRec"),
        toolbar: document.getElementById("toolbarCatRec"), selLinhas: document.getElementById("ippCatRec"),
        ulPag: document.getElementById("pagCatRec"), infoSpan: document.getElementById("infoCatRec"),
        colunas: [
            { chave: "nome",  tipo: "texto", label: "Nome",  opcoes: false },
            { chave: "acoes", tipo: "acoes", label: "Ações", opcoes: false },
        ]
    });

    function addCategoria(paginator, id, nome, tipo) {
        const tr = document.createElement("tr");
        tr.dataset.id = id;
        tr.innerHTML =
            '<td><span class="badge bg-light text-dark border">' + nome + '</span></td>' +
            '<td class="text-center"><button class="btn btn-outline-danger btn-sm">Remover</button></td>';
        tr.querySelector("button").addEventListener("click", () => {
            if (!confirm('Remover a categoria "' + nome + '"?')) return;
            fetch("/api/remover_categoria", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id}) })
                .then(r=>r.json()).then(d=>{ if(d.success) paginator.remover(tr); else alert("Erro: "+(d.error||"")); });
        });
        paginator.adicionar(tr, { nome: nome });
    }

    document.getElementById("formDesp").addEventListener("submit", e => {
        e.preventDefault();
        const nome = document.getElementById("nomeCatDesp").value.trim();
        if (!nome) return;
        fetch("/api/adicionar_categoria", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({nome, tipo:"despesa"}) })
            .then(r=>r.json()).then(d=>{ if(d.success) { addCategoria(pagDesp, d.id, nome, "despesa"); document.getElementById("formDesp").reset(); } else alert("Erro: "+(d.error||"")); });
    });

    document.getElementById("formRec").addEventListener("submit", e => {
        e.preventDefault();
        const nome = document.getElementById("nomeCatRec").value.trim();
        if (!nome) return;
        fetch("/api/adicionar_categoria", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({nome, tipo:"receita"}) })
            .then(r=>r.json()).then(d=>{ if(d.success) { addCategoria(pagRec, d.id, nome, "receita"); document.getElementById("formRec").reset(); } else alert("Erro: "+(d.error||"")); });
    });

    const categorias = {{ categorias | tojson | default('[]') | safe }};
    categorias.forEach(c => {
        const [id, nome, tipo] = c;
        if (tipo === "despesa") addCategoria(pagDesp, id, nome, tipo);
        else if (tipo === "receita") addCategoria(pagRec, id, nome, tipo);
    });
});
</script>
    </div><!-- /sidebar-content -->
</div><!-- /page-wrapper -->

<script src="{{ url_for('static', filename='js/tabela-utils.js') }}"></script>
</body>
</html>
